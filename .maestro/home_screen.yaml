appId: com.reclub-brian.maestro-demo
---

- launchApp:
    clearState: true

# ── 1. Header ────────────────────────────────
- assertVisible:
    id: "scroll_main"

- assertVisible:
    id: "header"

- assertVisible:
    id: "header_name"
    label: "Hi Tony,"

# ── 2. Search input ──────────────────────────
- assertVisible:
    id: "search_container"

- assertVisible:
    id: "input_search"

# Nhập từ khóa → drill list filter
- tapOn:
    id: "input_search"

- inputText: "Professional"

- assertVisible:
    id: "drill_title_1"

- assertNotVisible:
    id: "btn_drill_2"

- assertNotVisible:
    id: "btn_drill_3"

# Xoá → tìm từ không khớp → hiện empty state
- eraseText: 12

- inputText: "xyz_no_match"

- assertVisible:
    id: "no_results"

# Xoá → ẩn keyboard → về danh sách đầy đủ
- eraseText: 12

- hideKeyboard

- scrollUntilVisible:
    element:
      id: "btn_drill_1"
    direction: UP

- assertVisible:
    id: "btn_drill_1"

- assertVisible:
    id: "btn_drill_2"

- assertVisible:
    id: "btn_drill_3"

# ── 3. Stats ─────────────────────────────────
- assertVisible:
    id: "stat_sessions"

- assertVisible:
    id: "stat_value_sessions"
