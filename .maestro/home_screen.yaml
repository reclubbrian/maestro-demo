- assertVisible:
    id: "stat_this_week"

- assertVisible:
    id: "stat_value_this_week"
    label: "3h 40m"

- assertVisible:
    id: "stat_dupr"

- assertVisible:
    id: "stat_value_dupr"
    label: "3.5"

# ── 4. Hero card ─────────────────────────────
- assertVisible:
    id: "btn_start_training"

- assertVisible:
    id: "start_training"

- assertVisible:
    id: "pick_a_drill"

- assertVisible:
    id: "begin"

# ── 5. Drills ────────────────────────────────
- assertVisible:
    id: "featured_drills"

- assertVisible:
    id: "btn_drill_1"

- assertVisible:
    id: "drill_title_1"
    label: "Kitchen Control"

- assertVisible:
    id: "btn_drill_2"

- assertVisible:
    id: "drill_title_2"
    label: "Third Shot Drop"

- assertVisible:
    id: "btn_drill_3"

- assertVisible:
    id: "drill_title_3"
    label: "Dink Rallies"

# ── 6. Scroll đến progress banner ────────────
- scrollUntilVisible:
    element:
      id: "progress_banner"
    direction: DOWN

- assertVisible:
    id: "progress_banner"

- assertVisible:
    id: "progress_pct"
    label: "60%"

- assertVisible:
    id: "progress_sub"
    label: "3 of 5 sessions completed"

- assertVisible:
    id: "progress_fill"

# ── 7. Fetch API – Training Logs ─────────────
- scrollUntilVisible:
    element:
      id: "fetch_section"
    direction: DOWN

- assertVisible:
    id: "btn_fetch"

- assertVisible:
    id: "btn_fetch_label"
    label: "Load logs"

- tapOn:
    id: "btn_fetch"

