name: Maestro Cloud Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Maestro Cloud Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download iOS Simulator build
        run: |
          curl -fL "${{ secrets.IOS_BUILD_URL }}" -o app.tar.gz
          tar -xzf app.tar.gz
          APP_PATH=$(find . -name "*.app" -maxdepth 3 | head -1)
          echo "Found app: $APP_PATH"
          zip -r app.zip "$APP_PATH"

      - name: Install Maestro CLI
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro Cloud tests (with retry)
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          SUCCESS=false
          for i in 1 2 3; do
            echo "Attempt $i..."
            if maestro cloud \
              --apiKey "$MAESTRO_CLOUD_API_KEY" \
              --ios-version 17 \
              app.zip \
              .maestro/; then
              SUCCESS=true
              break
            fi
            echo "Failed, retrying in 30s..."
            sleep 30
          done
          $SUCCESS || { echo "All attempts failed"; exit 1; }
