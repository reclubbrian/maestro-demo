name: Maestro Cloud Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build iOS & Run Maestro Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS Simulator (EAS)
        run: |
          eas build \
            --platform ios \
            --profile simulator \
            --non-interactive \
            --json \
            | tee build-output.json
          BUILD_URL=$(jq -r '.[0].artifacts.buildUrl' build-output.json)
          echo "BUILD_URL=$BUILD_URL" >> "$GITHUB_ENV"

      - name: Download build artifact
        run: curl -L "$BUILD_URL" -o app.tar.gz

      - name: Run Maestro Cloud tests
        uses: mobile-dev-inc/action-maestro-cloud@v1.9.1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: app.tar.gz
          flow-file: .maestro/
          ios-version: "17"
